[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "krrr"
version = "0.0.1"
description = "Kernel ridge Riesz regression. Sister package to rieszboost (Singh 2021; Lee & Schuler 2025)."
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "scikit-learn>=1.3",
    "rieszreg>=0.0.1",
]

[project.optional-dependencies]
test = ["pytest>=7", "pandas>=2.0"]
# `falkon` and `pykeops` solvers are supported via lazy import in
# krrr.solvers.falkon and krrr.solvers.keops. They are not declared as extras
# here because falkon is not on PyPI (only on a torch-version-specific index
# at https://falkonml.github.io/falkon/dist/) which uv's workspace lock
# cannot resolve. To use them, install separately:
#   pip install falkon -f https://falkonml.github.io/falkon/dist/torch2.5_cu118/index.html
#   pip install pykeops

[tool.setuptools.packages.find]
where = ["."]
include = ["krrr*"]
