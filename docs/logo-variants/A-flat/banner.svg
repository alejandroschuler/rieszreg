<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" role="img" aria-label="RieszReg">
  <title>RieszReg</title>
  <!-- mark: hyperplane (level set of φ) + perpendicular gradient α -->
  <g stroke="#1a1a1a" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
    <!-- level-set line, descending L→R -->
    <line x1="14" y1="34" x2="80" y2="66"/>
    <!-- arrow shaft, perpendicular to level set, ascending up-right from midpoint -->
    <line x1="47" y1="50" x2="62" y2="20"/>
    <!-- arrowhead V at tip -->
    <polyline points="55.5,21.5 62,20 62.5,28"/>
  </g>
  <!-- alpha label near arrow tip -->
  <text x="68" y="26" font-family="'Latin Modern Math','STIX Two Math','Cambria Math',Georgia,serif"
        font-style="italic" font-size="22" fill="#1a1a1a">α</text>
  <!-- wordmark -->
  <text x="100" y="64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',system-ui,sans-serif"
        font-size="42" font-weight="600" letter-spacing="-0.5" fill="#1a1a1a">RieszReg</text>
</svg>
