<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 96" role="img" aria-label="RieszReg">
  <title>RieszReg</title>
  <defs>
    <linearGradient id="grad-G" gradientUnits="userSpaceOnUse" x1="56" y1="0" x2="140" y2="0">
      <stop offset="0%" stop-color="#2d6cdf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- α as a brand letter on the left -->
  <text x="26" y="70" text-anchor="middle"
        font-family="'Latin Modern Math','STIX Two Math','Cambria Math',Georgia,serif"
        font-style="italic" font-size="56" fill="#1a1a1a">α</text>
  <!-- regression curve + scatter to the right of α -->
  <path d="M 56 60 Q 72 18 96 38 T 140 18" fill="none" stroke="url(#grad-G)"
        stroke-width="2.75" stroke-linecap="round"/>
  <g fill="url(#grad-G)">
    <circle cx="60" cy="58" r="2"/>
    <circle cx="68" cy="40" r="2"/>
    <circle cx="78" cy="30" r="2"/>
    <circle cx="90" cy="36" r="2"/>
    <circle cx="104" cy="38" r="2"/>
    <circle cx="116" cy="34" r="2"/>
    <circle cx="128" cy="26" r="2"/>
    <circle cx="138" cy="20" r="2"/>
  </g>
  <!-- wordmark -->
  <text x="156" y="64"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',system-ui,sans-serif"
        font-size="44" font-weight="600" letter-spacing="-0.5" fill="#1a1a1a">RieszReg</text>
</svg>
