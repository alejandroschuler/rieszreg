<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="RieszReg banner">
  <title>RieszReg banner</title>
  <defs>
    <linearGradient id="bg-warm-K" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#3a0850"/>
      <stop offset="55%"  stop-color="#db2777"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="fade-warm-K" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg-warm-K)"/>

  <g stroke="#ffffff" stroke-opacity="0.07" stroke-width="1">
    <line x1="0"    y1="80"  x2="80"   y2="0"/>
    <line x1="0"    y1="200" x2="200"  y2="0"/>
    <line x1="40"   y1="280" x2="320"  y2="0"/>
    <line x1="160"  y1="280" x2="440"  y2="0"/>
    <line x1="280"  y1="280" x2="560"  y2="0"/>
    <line x1="400"  y1="280" x2="680"  y2="0"/>
    <line x1="520"  y1="280" x2="800"  y2="0"/>
    <line x1="640"  y1="280" x2="920"  y2="0"/>
    <line x1="760"  y1="280" x2="1040" y2="0"/>
    <line x1="880"  y1="280" x2="1160" y2="0"/>
    <line x1="1000" y1="280" x2="1200" y2="80"/>
    <line x1="1120" y1="280" x2="1200" y2="200"/>
  </g>

  <rect width="1200" height="280" fill="url(#fade-warm-K)"/>

  <!-- Curve: starts low-left, ascends across to exit at upper-right (~60% from bottom). -->
  <path d="M 0 245 C 200 180, 400 260, 600 215 C 800 130, 1000 140, 1200 112"
        fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round"/>

  <g fill="#ffffff" fill-opacity="0.85">
    <circle cx="60"   cy="222" r="3"/>
    <circle cx="140"  cy="225" r="3"/>
    <circle cx="230"  cy="215" r="3"/>
    <circle cx="320"  cy="232" r="3"/>
    <circle cx="410"  cy="222" r="3"/>
    <circle cx="500"  cy="240" r="3"/>
    <circle cx="600"  cy="208" r="3"/>
    <circle cx="700"  cy="195" r="3"/>
    <circle cx="780"  cy="155" r="3"/>
    <circle cx="870"  cy="138" r="3"/>
    <circle cx="960"  cy="145" r="3"/>
    <circle cx="1050" cy="117" r="3"/>
    <circle cx="1140" cy="125" r="3"/>
  </g>

  <text x="80" y="135"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1.5">RieszReg</text>

  <text x="84" y="178"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#ffffff" fill-opacity="0.92">
    Riesz regression for semiparametric inference
  </text>
</svg>
