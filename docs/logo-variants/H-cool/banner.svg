<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="RieszReg banner">
  <title>RieszReg banner</title>
  <defs>
    <linearGradient id="bg-cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0e2b5c"/>
      <stop offset="55%"  stop-color="#2d6cdf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="fade-cool" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg-cool)"/>

  <!-- Level-set lines: parallel to iso-color contours of the bg gradient
       (perpendicular to the (0,0)→(1,1) gradient direction). -->
  <g stroke="#ffffff" stroke-opacity="0.07" stroke-width="1">
    <line x1="0"    y1="80"  x2="80"   y2="0"/>
    <line x1="0"    y1="200" x2="200"  y2="0"/>
    <line x1="40"   y1="280" x2="320"  y2="0"/>
    <line x1="160"  y1="280" x2="440"  y2="0"/>
    <line x1="280"  y1="280" x2="560"  y2="0"/>
    <line x1="400"  y1="280" x2="680"  y2="0"/>
    <line x1="520"  y1="280" x2="800"  y2="0"/>
    <line x1="640"  y1="280" x2="920"  y2="0"/>
    <line x1="760"  y1="280" x2="1040" y2="0"/>
    <line x1="880"  y1="280" x2="1160" y2="0"/>
    <line x1="1000" y1="280" x2="1200" y2="80"/>
    <line x1="1120" y1="280" x2="1200" y2="200"/>
  </g>

  <!-- Soft horizontal highlight band -->
  <rect width="1200" height="280" fill="url(#fade-cool)"/>

  <!-- Single regression curve, in the lower portion of the banner -->
  <path d="M 0 245 C 200 180, 400 260, 600 215 C 800 175, 1000 250, 1200 205"
        fill="none" stroke="#ffffff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round"/>

  <!-- Scatter points near the curve -->
  <g fill="#ffffff" fill-opacity="0.85">
    <circle cx="60"   cy="222" r="3"/>
    <circle cx="140"  cy="218" r="3"/>
    <circle cx="230"  cy="230" r="3"/>
    <circle cx="320"  cy="215" r="3"/>
    <circle cx="410"  cy="240" r="3"/>
    <circle cx="500"  cy="235" r="3"/>
    <circle cx="600"  cy="220" r="3"/>
    <circle cx="690"  cy="198" r="3"/>
    <circle cx="780"  cy="215" r="3"/>
    <circle cx="870"  cy="200" r="3"/>
    <circle cx="960"  cy="222" r="3"/>
    <circle cx="1050" cy="230" r="3"/>
    <circle cx="1140" cy="212" r="3"/>
  </g>

  <!-- Title -->
  <text x="80" y="135"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1.5">RieszReg</text>

  <!-- Tagline -->
  <text x="84" y="178"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="22" font-weight="400" fill="#ffffff" fill-opacity="0.92">
    Riesz regression for semiparametric inference
  </text>
</svg>
