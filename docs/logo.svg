<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" role="img" aria-label="RieszReg">
  <title>RieszReg</title>
  <defs>
    <linearGradient id="rr-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d6cdf"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
  </defs>
  <!-- Mark: a stylized "R" formed by a curve + a horizontal axis,
       evoking a regression line through a representer surface. -->
  <g transform="translate(8, 8)">
    <rect x="0" y="0" width="48" height="48" rx="10" fill="url(#rr-grad)"/>
    <!-- baseline -->
    <line x1="6" y1="40" x2="42" y2="40" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    <!-- regression curve -->
    <path d="M 6 34 Q 18 12 30 24 T 42 14"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- alpha symbol marker -->
    <circle cx="30" cy="24" r="2.5" fill="#ffffff"/>
  </g>
  <!-- Wordmark -->
  <text x="68" y="42"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="700" fill="#1a1a1a">RieszReg</text>
</svg>
