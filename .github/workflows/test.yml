name: Test rieszreg (Python + R)

on:
  push:
    branches: [main]
    paths:
      - 'rieszreg/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'rieszreg/**'
  workflow_dispatch:

# Each implementation package (rieszboost, krrr) has its own test.yml that
# checks out rieszreg as a sibling and runs against it. This workflow is
# scoped to the meta-package itself.

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install rieszreg + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e rieszreg/python[test]
          pip install pandas

      - name: pytest rieszreg
        run: pytest rieszreg/python/tests -q
