name: Test (Python + R)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base ref
        id: base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            git fetch --no-tags --depth=2 origin "${{ github.event.before }}" || true
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Doc-tone lint on changed prose
        run: bash .githooks/lint-docs.sh --base "${{ steps.base.outputs.ref }}"

  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12']
        package: [rieszreg, rieszboost, krrr, forestriesz, riesznet, riesztree]

    steps:
      - uses: actions/checkout@v4

      - name: Install libomp (macOS — xgboost runtime needs it)
        if: matrix.os == 'macos-latest'
        run: brew install libomp

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages --all-extras --python ${{ matrix.python }}

      - name: pytest packages/${{ matrix.package }}/python/tests
        run: uv run pytest packages/${{ matrix.package }}/python/tests -q

  rtests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [rieszboost, krrr, forestriesz, riesznet, riesztree]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace (R parity tests reticulate into the workspace venv)
        run: uv sync --all-packages --all-extras

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      # Install rieszreg + the sibling under test from their workspace-local
      # paths. pak's solver sees both DESCRIPTIONs at once, so the sibling's
      # `Imports: rieszreg (>= 0.0.1)` resolves against the local rieszreg
      # rather than falling through to CRAN.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            local::./packages/rieszreg/r/rieszreg
            local::./packages/${{ matrix.package }}/r/${{ matrix.package }}
            any::testthat

      - name: Run R parity tests
        run: |
          export RETICULATE_PYTHON=$(uv run python -c 'import sys; print(sys.executable)')
          Rscript -e '
            pkg <- "${{ matrix.package }}"
            library(rieszreg)
            library(pkg, character.only = TRUE)
            test_dir <- file.path("packages", pkg, "r", pkg, "tests", "testthat")
            if (dir.exists(test_dir)) {
              testthat::test_dir(test_dir)
            } else {
              cat("(no testthat dir for", pkg, ")\n")
            }
          '
