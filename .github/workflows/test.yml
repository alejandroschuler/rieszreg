name: Test (Python + R)

on:
  push:
    branches: [main]
    paths:
      - 'rieszreg/**'
      - 'rieszboost/**'
      - 'krrr/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'rieszreg/**'
      - 'rieszboost/**'
      - 'krrr/**'
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install OS prerequisites (macOS only)
        if: matrix.os == 'macos-latest'
        run: brew install libomp

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e rieszreg/python[test]
          pip install -e rieszboost/python[test]
          pip install -e krrr/python[test]
          pip install pandas hypothesis

      - name: pytest rieszboost
        run: pytest rieszboost/python/tests -q

      - name: pytest krrr
        run: pytest krrr/python/tests -q

      - name: pytest rieszreg
        run: pytest rieszreg/python/tests -q
        if: hashFiles('rieszreg/python/tests/**') != ''

  r-tests:
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -e rieszreg/python
          pip install -e rieszboost/python
          pip install -e krrr/python
          pip install pandas

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::reticulate
            any::R6
            any::pkgload
            any::testthat
          working-directory: rieszreg/r/rieszreg

      - name: Point reticulate at the project Python
        run: echo "RETICULATE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> $GITHUB_ENV

      - name: rieszboost R parity tests
        run: |
          Rscript -e '
            pkgload::load_all("rieszreg/r/rieszreg", quiet=TRUE)
            pkgload::load_all("rieszboost/r/rieszboost", quiet=TRUE)
            stopifnot(testthat::test_dir(
              "rieszboost/r/rieszboost/tests/testthat",
              reporter = "summary",
              stop_on_failure = TRUE
            ))
          '

      - name: krrr R parity tests
        run: |
          Rscript -e '
            pkgload::load_all("rieszreg/r/rieszreg", quiet=TRUE)
            pkgload::load_all("krrr/r/krrr", quiet=TRUE)
            stopifnot(testthat::test_dir(
              "krrr/r/krrr/tests/testthat",
              reporter = "summary",
              stop_on_failure = TRUE
            ))
          '
