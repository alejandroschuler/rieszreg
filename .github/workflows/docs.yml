name: Render and deploy unified docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'rieszreg/python/**'
      - 'rieszreg/r/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write   # required to push to gh-pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rieszreg (this repo)
        uses: actions/checkout@v4

      - name: Checkout rieszboost (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: rieszreg/rieszboost
          path: rieszboost
          # Optional: pin to a tag/sha if you want reproducible doc builds.
        continue-on-error: true

      - name: Checkout krrr (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: rieszreg/krrr
          path: krrr
        continue-on-error: true

      - name: Checkout forestriesz (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: rieszreg/forestriesz
          path: forestriesz
        continue-on-error: true

      - name: Checkout riesznet (sibling repo)
        uses: actions/checkout@v4
        with:
          repository: rieszreg/riesznet
          path: riesznet
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install rieszreg + impl packages + doc deps
        run: |
          python -m pip install --upgrade pip
          pip install -e rieszreg/python
          if [ -d rieszboost/python ]; then pip install -e rieszboost/python; fi
          if [ -d krrr/python ]; then pip install -e krrr/python; fi
          if [ -d forestriesz/python ]; then pip install -e forestriesz/python; fi
          if [ -d riesznet/python ]; then pip install -e riesznet/python; fi
          pip install matplotlib pandas

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::reticulate
            any::R6
            any::pkgload
          working-directory: rieszreg/r/rieszreg

      - name: Point reticulate at the project Python
        run: echo "RETICULATE_PYTHON=$(python -c 'import sys; print(sys.executable)')" >> $GITHUB_ENV

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2
        with:
          path: docs

      - name: Publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: docs
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
